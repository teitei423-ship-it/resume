<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angela Resume</title>

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial,"Microsoft JhengHei",sans-serif;
    background:#f3f5f8;
    color:#222;
}

/* ⭐ 這裡是關鍵大小 */
.page{
    max-width:1000px;
    margin:40px auto;
    background:#fff;
    border-radius:20px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
    padding:24px;
}

.layout{
    display:grid;
    grid-template-columns:180px 1fr;
    gap:28px;
}

/* ⭐ 頭像大小 */
.avatar-box{
    width:150px;
    height:150px;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:16px;
}

.avatar-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.student-id-label{
    font-size:14px;
    color:#666;
}

.student-id{
    font-weight:bold;
    margin-bottom:14px;
}

.btn{
    background:#67b9c0;
    border:none;
    color:#fff;
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    font-size:14px;
}

/* ⭐ 名字大小 */
.right h1{
    margin:0;
    font-size:44px;
}

.subtitle{
    color:#777;
    margin-bottom:18px;
    font-size:16px;
}

.section-title{
    font-weight:bold;
    margin-top:18px;
    font-size:16px;
}

.intro,.skill-text,.exp-text,.contact-value{
    font-size:15px;
    line-height:1.7;
    color:#444;
}

.skills-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
}

.bottom-actions{
    margin-top:18px;
}

.footer{
    margin-top:24px;
    font-size:13px;
    color:#999;
    text-align:right;
}
</style>
</head>

<body>

<div class="page">
<div class="layout">

<div>
    <div class="avatar-box">
        <img src="images/EBDD9F85-829A-4A84-AFB0-CB9F5BB481AD.jpg">
    </div>

    <div class="student-id-label">學生編號:</div>
    <div class="student-id">114055007</div>

    <button class="btn" onclick="copyID()">複製學號</button>
</div>

<div class="right">
    <h1>王瑀喬</h1>
    <div class="subtitle">第一學年・亞洲大學・室內設計學系</div>

    <div class="section-title">個人簡介</div>
    <div class="intro">
        我是亞洲大學室內設計系學生，對空間設計與視覺創作有濃厚興趣，
        喜歡結合插畫與AI工具進行創作，持續學習新的設計技術。
    </div>

    <div class="section-title">學歷</div>
    <div>亞洲大學（在學）— 室內設計學系</div>

    <div class="section-title">技能</div>
    <div class="skills-grid">
        <div>
            <b>設計</b>
            <div class="skill-text">室內設計、空間規劃、版面編排</div>
        </div>
        <div>
            <b>數位工具</b>
            <div class="skill-text">Illustration、AI Design、HTML/CSS</div>
        </div>
    </div>

    <div class="section-title">經歷</div>
    <div class="exp-text">
        目前以學習與作品累積為主，持續精進設計能力與創作表現。
    </div>

    <div class="section-title">聯絡方式</div>
    <div class="contact-value">Email: 114055007@live.asia.edu.tw</div>
    <div class="contact-value">電話: 0986691735</div>

    <div class="bottom-actions">
        <button class="btn" onclick="window.print()">列印 / PDF</button>
    </div>
</div>

</div>

<div class="footer">
最後更新：2026/3/22
</div>

</div>

<script>
function copyID(){
    navigator.clipboard.writeText("114055007");
    alert("學號已複製");
}
</script>

</body>
</html>
